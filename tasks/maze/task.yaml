name: maze
title: "Maze Explorer: First-Person Web Maze Game"
description: >
  Web-based first-person maze exploration game with grid-based movement,
  3D rendering, minimap, special terrain, and procedural maze generation.
  Tests exercise rendering, interactivity, and usability via Playwright.

engine_cmd: "python3 -m http.server 8000"

domain_tags:
  - visualization
  - gui
  - stateful
  - simulation

stages:
  - id: dungeon_logic
    spec: stages/01_dungeon_logic.md
    type: feature_addition
    training_tests: tests/training/test_01_dungeon_logic.py
    holdout_tests: tests/holdout/test_01_dungeon_logic_holdout.py
    perf_tests: tests/perf/test_01_dungeon_logic_perf.py

  - id: ui_minimap
    spec: stages/02_ui_minimap.md
    type: feature_addition
    training_tests: tests/training/test_02_ui_minimap.py
    holdout_tests: tests/holdout/test_02_ui_minimap_holdout.py
    perf_tests: tests/perf/test_02_ui_minimap_perf.py

  - id: procedural_generation
    spec: stages/03_procedural_generation.md
    type: feature_addition
    training_tests: tests/training/test_03_procedural_generation.py
    holdout_tests: tests/holdout/test_03_procedural_generation_holdout.py
    perf_tests: tests/perf/test_03_procedural_generation_perf.py

  - id: texture_mapping
    spec: stages/04_texture_mapping.md
    type: feature_addition
    training_tests: tests/training/test_04_texture_mapping.py
    holdout_tests: tests/holdout/test_04_texture_mapping_holdout.py
    perf_tests: tests/perf/test_04_texture_mapping_perf.py

pipelines:
  sequential_full:
    stages: [dungeon_logic, ui_minimap, procedural_generation, texture_mapping]
    differential: sequential

  sequential_diff_ab:
    stages:
      - {stage: dungeon_logic, slot: A}
      - {stage: ui_minimap, slot: A}
      - {stage: procedural_generation, slot: B}
      - {stage: texture_mapping, slot: B}
    differential: sequential
